apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ibm-mq-auth
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ibm-mq-auth
  serviceName: ibm-mq-auth
  template:
    metadata:
      labels:
        app: ibm-mq-auth
    spec:
      containers:
      - env:
        - name: LICENSE
          value: accept
        - name: MQ_QMGR_NAME
          value: QM01
        - name: MQ_ENABLE_WEB
          value: "true"
        - name: MQ_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: mq-web-credentials
        - name: MQ_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: mq-app-credentials  
        image: quay.io/aelfeki007/ibm-messaging/mq:9.4.5.0-r2
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - chkmqhealthy
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: mq
        readinessProbe:
          exec:
            command:
            - chkmqready
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /mnt/mqm
          name: mq-data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 30
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: mq-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      volumeMode: Filesystem

---

apiVersion: v1
kind: Service
metadata:
  name: ibm-mq-auth
spec:
  selector:
    app: ibm-mq-auth
  ports:
  - name: mq
    port: 1414
    targetPort: 1414
  - name: web
    port: 9443
    targetPort: 9443

--- 
apiVersion: v1
kind: Secret
metadata:
  name: mq-app-credentials
type: Opaque
stringData:
  password: <app-password>
